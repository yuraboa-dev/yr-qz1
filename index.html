<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>염증의 증상 형성평가 퀴즈</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Pretendard Web Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- Canvas Confetti (폭죽 효과용 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }
        /* 화면 흔들림 애니메이션 (오답 시) */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
            20%, 40%, 60%, 80% { transform: translateX(8px); }
        }
        .shake-effect {
            animation: shake 0.5s ease-in-out;
        }
        /* 폭탄 커지는 애니메이션 */
        @keyframes bomb-expand {
            0% { transform: scale(0.3) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(-15deg); opacity: 1; }
            70% { transform: scale(1) rotate(15deg); }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .bomb-animation {
            animation: bomb-expand 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        /* 연기 구름 효과 */
        @keyframes smoke-fade {
            0% { transform: scale(0.8); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }
        .smoke-animation {
            animation: smoke-fade 1s ease-out forwards;
        }
        /* 페이드인 효과 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

                ],
                answer: 3, // 적혈구 침강 속도... (4번 보기)
                explanation: "적혈구 침강 속도(ESR)와 급성기 반응 단백질인 C-반응단백(CRP)은 염증 유무를 판별하는 가장 널리 쓰이는 혈액학적 지표입니다."
            },
            {
                num: 9,
                difficulty: "어려운",
                difficultyColor: "bg-purple-100 text-purple-700 border border-purple-200",
                question: "염증이 발생하면 일반적으로 면역을 담당하는 백혈구 수가 증가합니다. 그러나 특정 질환이나 특수 감염 시 백혈구 수가 감소하게 되는데, 다음 중 백혈구 수치의 감소가 나타나지 않는 일반적인 상황은 무엇인가요?",
                options: [
                    "신체 일부의 급성 피부 외상으로 인한 일반적인 세균 침투 및 초기 염증 반응",
                    "바이러스나 리케차, 원충 감염 상황",
                    "체내 면역 시스템이 극도로 붕괴된 말기 암 환자 상태",
                    "심각한 전신 손상을 입어 백혈구 생성에 지장이 생긴 특수 세균 감염 상황"
                ],
                answer: 0, // 신체 일부의 급성... (1번 보기)
                explanation: "일반적인 급성 염증 반응에서는 면역 세포의 집중을 위해 혈액 내 백혈구 수가 증가합니다. 반면, 특정 특수 감염이나 말기 암 환자 등에서는 감소 현상이 나타납니다."
            },
            {
                num: 10,
                difficulty: "어려운",
                difficultyColor: "bg-purple-100 text-purple-700 border border-purple-200",
                question: "염증의 급성기에 적혈구가 줄에 꿴 엽전 모양으로 뭉쳐지는 '적혈구 연전 현상'의 직접적 결과와, 이때 급증하는 대표적 혈액 성분을 올바르게 짝지은 것은 무엇인가요?",
                options: [
                    "적혈구 침강 속도가 느려짐 - 아세틸콜린 수치 감소",
                    "적혈구 침강 속도가 빨라짐 - C-반응단백(CRP) 수치 증가",
                    "적혈구 침강 속도가 빨라짐 - 헤모글로빈 및 철분 농도 급증",
                    "적혈구 침강 속도가 느려짐 - 면역글로불린 수치 급증"
                ],
                answer: 1, // 적혈구 침강 속도가... (2번 보기)
                explanation: "적혈구 연전 현상으로 무거워진 적혈구는 더 신속히 가라앉아 적혈구 침강 속도(ESR)를 증가시키며, 간에서 생성되는 염증성 표지자인 C-반응단백(CRP) 수치가 급증하게 됩니다."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let startTime = null;
        let timerInterval = null;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const btnStart = document.getElementById('btn-start');
        const btnRestart = document.getElementById('btn-restart');
        const btnNext = document.getElementById('btn-next');
        
        const progressIndicator = document.getElementById('progress-indicator');
        const progressBar = document.getElementById('progress-bar');
        const difficultyBadge = document.getElementById('difficulty-badge');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        
        const feedbackOverlay = document.getElementById('feedback-overlay');
        const bombContainer = document.getElementById('bomb-container');
        const bombEmoji = document.getElementById('bomb-emoji');
        const explosionEffect = document.getElementById('explosion-effect');
        const smokeEffect = document.getElementById('smoke-effect');
        const feedbackCard = document.getElementById('feedback-card');
        const feedbackBadge = document.getElementById('feedback-badge');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackExplanation = document.getElementById('feedback-explanation');
        
        const resultEmoji = document.getElementById('result-emoji');
        const resultText = document.getElementById('result-text');
        const scoreText = document.getElementById('score-text');
        const timeText = document.getElementById('time-text');
        const srAnnouncer = document.getElementById('sr-announcer');

        // 스크린 리더용 안내 도우미 함수
        function announceToScreenReader(message) {
            srAnnouncer.textContent = message;
        }

        // 시간 표시 포맷팅 함수 (MM:SS)
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // 퀴즈 시작 함수
        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            startTime = Date.now();
            
            // 타이머 시작
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                // 백그라운드에서 시간만 체크
            }, 1000);

            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            progressIndicator.classList.remove('hidden');

            loadQuestion();
            announceToScreenReader("퀴즈가 시작되었습니다. 첫 번째 문제로 이동합니다.");
        }

        // 문제 로드 함수
        function loadQuestion() {
            const q = quizQuestions[currentQuestionIndex];
            
            // 프로그레스 바 및 텍스트 업데이트
            const progressPercent = ((currentQuestionIndex) / quizQuestions.length) * 100;
            progressBar.style.width = `${progressPercent}%`;
            progressIndicator.textContent = `${currentQuestionIndex + 1} / ${quizQuestions.length}`;
            
            // 난이도 및 문제 텍스트 적용
            difficultyBadge.textContent = `난이도: ${q.difficulty}`;
            difficultyBadge.className = `inline-block px-3 py-1 rounded-full text-xs font-black tracking-wider uppercase ${q.difficultyColor}`;
            questionText.textContent = q.question;
            
            // 보기 생성
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-slate-100 hover:bg-indigo-50 border border-slate-200 hover:border-indigo-300 rounded-2xl p-4 md:p-5 text-base md:text-lg font-bold flex items-center space-x-3 transition-all active:scale-[0.99] focus:outline-none focus:ring-4 focus:ring-indigo-200 focus:bg-indigo-50 text-slate-700";
                
                // 보기 번호 원형 라벨
                const numLabel = document.createElement('span');
                numLabel.className = "flex-shrink-0 w-8 h-8 rounded-full bg-white border border-slate-300 text-slate-600 font-extrabold flex items-center justify-center text-sm";
                numLabel.textContent = idx + 1;
                
                // 보기 텍스트
                const textSpan = document.createElement('span');
                textSpan.className = "flex-grow leading-snug";
                textSpan.textContent = opt;
                
                btn.appendChild(numLabel);
                btn.appendChild(textSpan);
                btn.onclick = () => selectOption(idx);
                
                optionsContainer.appendChild(btn);
            });

            // 스크린 리더용 읽기
            announceToScreenReader(`문제 ${currentQuestionIndex + 1}. 난이도 ${q.difficulty}. ${q.question}`);
        }

        // 정오답 선택 처리 함수
        function selectOption(selectedIdx) {
            const q = quizQuestions[currentQuestionIndex];
            const isCorrect = selectedIdx === q.answer;

            // 모든 옵션 버튼 비활성화
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);

            // 오버레이 및 피드백 노출 준비
            feedbackOverlay.classList.remove('hidden');
            feedbackCard.className = "bg-white rounded-3xl p-6 shadow-2xl border-2 border-slate-100 mt-4 max-w-xs scale-90 opacity-0 transition-all duration-300";

            if (isCorrect) {
                // 1. 정답인 경우: 폭죽 효과 및 긍정적 메시지
                score += 10;
                
                // 폭죽 팡팡
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 }
                });

                // 스크린 리더 알림
                announceToScreenReader("정답입니다! 폭죽이 터졌습니다.");

                // 피드백 UI 세팅
                feedbackBadge.textContent = "CORRECT";
                feedbackBadge.className = "inline-block px-3 py-1 rounded-full text-xs font-black mb-2 bg-green-100 text-green-700 border border-green-200";
                feedbackTitle.textContent = "정답입니다! 🎉";
                feedbackTitle.className = "text-2xl font-black mb-2 text-green-600";
                feedbackExplanation.textContent = q.explanation;

                // 정답 카드 즉시 노출
                setTimeout(() => {
                    feedbackCard.classList.remove('scale-90', 'opacity-0');
                    feedbackCard.classList.add('scale-100', 'opacity-100');
                    btnNext.focus();
                }, 100);

            } else {
                // 2. 오답인 경우: 폭탄 흔들림 효과 및 피드백
                
                // 폭탄 연출 보이기
                bombEmoji.classList.remove('hidden');
                bombEmoji.classList.add('bomb-animation');
                
                // 화면 전체 진동 효과
                quizScreen.classList.add('shake-effect');
                
                // 스크린 리더 알림
                announceToScreenReader("아쉽게도 틀렸습니다. 폭탄이 폭발합니다.");

                // 0.4초 후 폭발 효과
                setTimeout(() => {
                    bombEmoji.classList.add('hidden');
                    explosionEffect.classList.remove('hidden');
                    smokeEffect.classList.add('smoke-animation');
                }, 400);

                // 0.8초 후 폭발 사라지고 피드백 카드 노출
                setTimeout(() => {
                    explosionEffect.classList.add('hidden');
                    
                    feedbackBadge.textContent = "INCORRECT";
                    feedbackBadge.className = "inline-block px-3 py-1 rounded-full text-xs font-black mb-2 bg-red-100 text-red-700 border border-red-200";
                    feedbackTitle.textContent = "오답입니다 💣";
                    feedbackTitle.className = "text-2xl font-black mb-2 text-red-600";
                    feedbackExplanation.textContent = `정답은 ${q.answer + 1}번입니다. \n\n${q.explanation}`;

                    feedbackCard.classList.remove('scale-90', 'opacity-0');
                    feedbackCard.classList.add('scale-100', 'opacity-100');
                    btnNext.focus();
                }, 800);
            }
        }

        // '다음 문제로' 버튼 클릭 핸들러
        function nextQuestion() {
            // 효과 초기화 및 오버레이 닫기
            feedbackOverlay.classList.add('hidden');
            bombEmoji.classList.add('hidden');
            bombEmoji.classList.remove('bomb-animation');
            explosionEffect.classList.add('hidden');
            smokeEffect.classList.remove('smoke-animation');
            quizScreen.classList.remove('shake-effect');

            currentQuestionIndex++;

            if (currentQuestionIndex < quizQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        // 결과 화면 노출 함수
        function showResults() {
            if (timerInterval) clearInterval(timerInterval);
            
            const elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
            
            quizScreen.classList.add('hidden');
            progressIndicator.classList.add('hidden');
            resultScreen.classList.remove('hidden');

            // 점수 및 결과 분석
            scoreText.textContent = `${score}점`;
            timeText.textContent = formatTime(elapsedSeconds);
            resultText.textContent = `총 ${quizQuestions.length}문제 중 ${score / 10}문제를 맞췄습니다!`;

            // 맞춘 점수별 피드백 및 이모지 설정
            let message = "";
            if (score === 100) {
                resultEmoji.textContent = "👑";
                message = "완벽합니다! 염증의 증상에 관한 모든 개념을 마스터하셨네요!";
                // 올백 폭죽
                confetti({ particleCount: 200, spread: 100 });
            } else if (score >= 70) {
                resultEmoji.textContent = "✨";
                message = "참 잘했습니다! 염증의 기전과 증상을 수준 높게 잘 이해하고 계십니다.";
            } else if (score >= 40) {
                resultEmoji.textContent = "👍";
                message = "좋은 시도였습니다! 텍스트 내용을 한 번만 더 정독하면 만점이 가능해요!";
            } else {
                resultEmoji.textContent = "📚";
                message = "염증 증상의 국소 및 전신적 특성을 다시 한 번 꼼꼼히 복습해 봅시다!";
            }

            const feedbackSummary = document.createElement('p');
            feedbackSummary.className = "text-slate-600 font-medium text-base mt-2 px-4";
            feedbackSummary.textContent = message;
            
            // 기존 텍스트 제거 후 삽입
            const existingSummary = resultScreen.querySelector('.summary-desc');
            if (existingSummary) existingSummary.remove();
            feedbackSummary.classList.add('summary-desc');
            resultText.parentNode.insertBefore(feedbackSummary, resultText.nextSibling);

            // 결과 안내 스크린 리더 지원
            announceToScreenReader(`시험이 완료되었습니다. 최종 점수는 ${score}점, 소요 시간은 ${formatTime(elapsedSeconds)}입니다. ${message}`);
            
            btnRestart.focus();
        }

        // 이벤트 리스너 연결
        btnStart.addEventListener('click', startQuiz);
        btnRestart.addEventListener('click', startQuiz);
        btnNext.addEventListener('click', nextQuestion);

        // 모바일 터치 이벤트 오작동 방지용 세팅
        document.addEventListener('touchstart', function() {}, {passive: true});
    </script>
</body>
</html>
